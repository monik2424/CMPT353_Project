version: '3.8'

services:
  app:
    build: .
    container_name: qa-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      WATCHPACK_POLLING: "true"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

  mysql:
    image: mysql:8
    container_name: qa-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: qa_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      retries: 5
      start_period: 10s
      timeout: 5s

volumes:
  db_data:
